services:
  mongodb:
    image: mongo:6
    container_name: rate-limiter-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rate-limiter-server
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - ./server/src:/app/src
      - ./server/package.json:/app/package.json
      - ./server/.env:/app/.env
    command: npm run dev
    environment:
      - NODE_ENV=development
      - NODEMON_POLLING_INTERVAL=1000
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/rate-limiter
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_super_secret_key_change_me
    depends_on:
      - mongodb
      - redis

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: rate-limiter-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - ./client/package.json:/app/package.json
      - ./client/.env:/app/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_API_URL=http://localhost:5001/api
    depends_on:
      - server

volumes:
  mongo-data: